<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPom - Relatórios</title>
    <link href="/static/css/report-style.css" rel="stylesheet">
    <link href="/static/css/nav-bar.css" rel="stylesheet">
    <link href="/static/css/weekly_dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="containe-geral dashboard">
        <header>
            <h1 id="title">Seu Progresso</h1>
            <div class="trend-indicator" id="indicador"></div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Hoje <small>hora</small></span>
                <h2 class="stat-value" id="total_hoje">00:00</h2>
            </div>
            <div class="stat-card">
                <span class="stat-label">7 ultimos dias <small>hora</small></span>
                <h2 class="stat-value" id="total_semana">00:00</h2>
            </div>
            <div class="stat-card">
                <span class="stat-label">Mês</span>
                <h2 class="stat-value" id="total_mes">00:00 </h2>
            </div>
        </section>

        <section class="chart-section">
            <span class="stat-label">Frequência Semanal</span>
            <div class="bar-chart" id="weekly-bar-chart">
            </div>
        </section>
    </div>
    <nav class="navbar-bottom">
        <div class="nav-item active" onclick="window.location.href='/page/report'"><span class="nav-text">Relatórios</span></div>
        <div class="nav-item" onclick="window.location.href='/'"><span class="nav-text">Pomodoro</span></div>
        <div class="nav-item" onclick="window.location.href='/page/options'"><span class="nav-text">Configurações</span></div>
    </nav>
    <script src="/static/js/report.js"></script>
</body>
</html>
