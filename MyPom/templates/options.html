<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPom - Configurações</title>
    <link href="/static/css/config-style.css" rel="stylesheet">
    <link href="/static/css/nav-bar.css" rel="stylesheet">
</head>
<body>
    <div class="containe-geral settings-page">
        <header>
            <h1 id="title">Configurações</h1>
        </header>

        <section class="settings-group">
            <h3>⏱️ Tempos (em minutos)</h3>
            <div class="setting-item">
                <label>Foco</label>
                <div class="control-wrapper">
                    <select id="focus-time">
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="45">45</option>
                        <option value="60">60</option>
                    </select>
                    <button type="submit" class="btn-option" id="btn-pomo-time">✓</button>
                </div>
            </div>
            <div class="setting-item">
                <label>Pausa Curta</label>
                <div class="control-wrapper">
                    <select>
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                    <button type="submit" class="btn-option" id="btn-short-break">✓</button>
                </div>
            </div>
        </section>

        <section class="settings-group">
            <h3>🔔 Notificações</h3>
            <div class="setting-item">
                <label>Som de alerta</label>
                <div class="control-wrapper">
                    <select id="sound-type">
                        <option value="digital">Digital</option>
                        <option value="sino">Sino</option>
                        <option value="natureza">Natureza</option>
                    </select>
                    <button type="submit" class="btn-option" id="btn-sound">✓</button>
                </div>
            </div>
        </section>

        <section class="settings-group">
            <h3>🔄 Banco de Dados</h3>
            <div class="setting-item">
                <button id="btn-clear-data">Limpar banco de dados?</button>
            </div>
        </section>
            
    </div>

    <nav class="navbar-bottom">
        <div class="nav-item" onclick="window.location.href='/page/report'"><span class="nav-text">Relatórios</span></div>
        <div class="nav-item" onclick="window.location.href='/'"><span class="nav-text">Pomodoro</span></div>
        <div class="nav-item active" onclick="window.location.href='/page/options'"><span class="nav-text">Configurações</span></div>
    </nav>

    <script src="/static/js/options.js"></script>
</body>
</html>
